name: Aseprite Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Get Skia URL
        shell: pwsh
        run: |
          $response = Invoke-RestMethod -Uri "https://api.github.com/repos/aseprite/skia/releases/latest"
          $url = $response.assets | Where-Object { $_.name -like "Skia-Windows-Release-x64.zip" } | Select-Object -First 1 -ExpandProperty browser_download_url
          echo "SKIA_URL=$url" >> $env:GITHUB_ENV

      - name: Download and extract Skia
        shell: pwsh
        run: |
          mkdir C:\deps -Force
          Invoke-WebRequest -Uri $env:SKIA_URL -OutFile C:\deps\skia.zip
          Expand-Archive -Path C:\deps\skia.zip -DestinationPath C:\deps\skia -Force

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake with Visual Studio generator
        run: |
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 `
            -DLAF_BACKEND=skia `
            -DSKIA_DIR=C:\deps\skia `
            -DSKIA_LIBRARY_DIR=C:\deps\skia\out\Release-x64 `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            ..

      - name: Build Aseprite
        run: |
          cd build
          cmake --build . --config RelWithDebInfo --target aseprite

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aseprite-Windows-Latest
          path: build\bin\aseprite.exe
