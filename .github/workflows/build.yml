name: Aseprite Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. 检出代码（包含所有子模块）
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'   # 关键！自动初始化并更新子模块

      # 2. 下载并准备 Skia 依赖
      - name: Get Skia URL
        shell: pwsh
        run: |
          $response = Invoke-RestMethod -Uri "https://api.github.com/repos/aseprite/skia/releases/latest"
          $url = $response.assets | Where-Object { $_.name -like "Skia-Windows-Release-x64.zip" } | Select-Object -First 1 -ExpandProperty browser_download_url
          echo "SKIA_URL=$url" >> $env:GITHUB_ENV

      - name: Download and extract Skia
        shell: pwsh
        run: |
          mkdir C:\deps -Force
          Invoke-WebRequest -Uri $env:SKIA_URL -OutFile C:\deps\skia.zip
          Expand-Archive -Path C:\deps\skia.zip -DestinationPath C:\deps\skia -Force

      # 3. 安装 CMake 和 Ninja
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: 'latest'

      - name: Install Ninja
        run: choco install ninja

      # 4. 构建 Aseprite（直接在工作目录中构建）
      - name: Build Aseprite
        shell: pwsh
        run: |
          # 加载 Visual Studio 环境（确保编译器可用）
          & "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64

          # 创建构建目录并进入
          New-Item -ItemType Directory -Force build
          Set-Location build

          # 运行 CMake 配置
          cmake -G Ninja `
            -DLAF_BACKEND=skia `
            -DSKIA_DIR=C:\deps\skia `
            -DSKIA_LIBRARY_DIR=C:\deps\skia\out\Release-x64 `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            ..

          # 执行编译
          ninja aseprite

      # 5. 上传编译产物
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aseprite-Windows-Latest
          path: build\bin\aseprite.exe
